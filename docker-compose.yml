services:
  lutheran-lectionary:
    image: ghcr.io/abc3-mac/lutheran-lectionary:latest
    container_name: lutheran-lectionary
    restart: unless-stopped
    ports:
      - "5765:5765"
    environment:
      FLASK_ENV: production
      TZ: America/Chicago  # Set to your local timezone so "Today" reflects the correct date
